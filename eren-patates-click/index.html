<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Simülatörü v8</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: 'Segoe UI', sans-serif; color: white; transition: transform 2s, opacity 2s; }
        canvas { display: block; }
        #ui-container { position: absolute; top: 10px; left: 10px; pointer-events: none; width: 100%; }
        .stat-box { background: rgba(0, 0, 0, 0.7); padding: 8px 15px; border-radius: 8px; border: 1px solid #444; margin-bottom: 5px; width: fit-content; pointer-events: all; }
        
        #market-btn { 
            position: absolute; top: 10px; right: 20px; 
            padding: 15px 25px; background: #ff9f43; border: none; border-radius: 5px; 
            cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; z-index: 10;
        }

        #market-overlay, #final-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center;
            pointer-events: all; z-index: 100;
        }

        .market-content, .final-content { 
            background: #2c3e50; padding: 25px; border-radius: 15px; width: 90%; max-width: 1100px;
            max-height: 85vh; overflow-y: auto; text-align: center;
        }

        .inv-upgrade-banner { 
            background: #8e44ad; padding: 15px; border-radius: 10px; margin-bottom: 20px; 
            cursor: pointer; font-weight: bold; transition: 0.3s; border: 2px solid #a29bfe;
        }

        .pack-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 10px; }
        .pack-card { background: #34495e; padding: 15px; border-radius: 10px; border: 2px solid #546e7a; width: 190px; }
        .premium { border-color: #f1c40f; background: #3d3002; }
        .lvl2-pack { border-color: #00d2ff; background: #002b36; }
        .lvl3-pack { border-color: #ff4757; background: #2f3542; }
        
        .chance-list { font-size: 11px; color: #bdc3c7; margin: 10px 0; text-align: left; line-height: 1.4; }
        .ball-item { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 10px; margin: 5px 0; border-radius: 5px; }
        
        .upgrade-btn { background: #27ae60; color: white; border: none; padding: 8px; border-radius: 3px; cursor: pointer; }
        .delete-btn { background: #e74c3c; color: white; border: none; padding: 8px; border-radius: 3px; cursor: pointer; }
        
        .rating-btn { background: #3498db; border: none; color: white; padding: 10px 15px; margin: 5px; border-radius: 5px; cursor: pointer; font-size: 18px; }
        .vortex { transform: scale(0) rotate(1080deg); opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="ui-container">
        <div class="stat-box">Puan: <span id="score-display">0</span></div>
        <div class="stat-box">Envanter: <span id="ball-count">1</span> / <span id="inv-limit">50</span></div>
        <div class="stat-box">Seviye: <span id="game-lvl">1</span></div>
    </div>

    <button id="market-btn" onclick="toggleMarket(true)">🛒 MARKET & ENVANTER</button>

    <div id="market-overlay">
        <div class="market-content">
            <span style="float:right; cursor:pointer; font-size: 24px;" onclick="toggleMarket(false)">✖</span>
            <h2>Market</h2>
            
            <div class="inv-upgrade-banner" id="inv-btn" onclick="upgradeInventory()">
                📦 ENVANTER KAPASİTESİNİ ARTIR (+10 Limit) <br>
                <small>Fiyat: 5.000 Puan</small>
            </div>

            <div id="active-packs" class="pack-container"></div>

            <div id="my-balls" style="margin-top:20px; border-top:1px solid #555">
                <h3>Toplarımı Yönet</h3>
            </div>
        </div>
    </div>

    <div id="final-overlay">
        <div class="final-content" id="final-screen">
            <h1>🏆 OYUNU KAZANDINIZ! 🏆</h1>
            <p>1 Trilyon puana ulaşarak evrenin hakimi oldunuz.</p>
            <hr>
            <h3>Oyunu beğendiniz mi?</h3>
            <div id="rating-container"></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');
        const ballCountDisplay = document.getElementById('ball-count');
        const invLimitDisplay = document.getElementById('inv-limit');
        const gameLvlDisplay = document.getElementById('game-lvl');
        const ballListContainer = document.getElementById('my-balls');
        const packContainer = document.getElementById('active-packs');

        let score = 0;
        let balls = [];
        let invLimit = 50;
        let gameLevel = 1;
        let isGameOver = false;

        const ballTypes = {
            common: { name: "Yaygın", color: "#2ecc71", baseValue: 1, speed: 7, upCost: 50 },
            rare: { name: "Nadir", color: "#3498db", baseValue: 5, speed: 9, upCost: 150 },
            epic: { name: "Destansı", color: "#9b59b6", baseValue: 20, speed: 11, upCost: 500 },
            legendary: { name: "Efsanevi", color: "#f1c40f", baseValue: 100, speed: 14, upCost: 1500 },
            special: { name: "Özel", color: "#e67e22", baseValue: 500, speed: 18, upCost: 5000 },
            mystic: { name: "Mistik", color: "#e91e63", baseValue: 2500, speed: 22, upCost: 20000 },
            quantum: { name: "Kuantum", color: "#00d2ff", baseValue: 10000, speed: 23, upCost: 50000 },
            void: { name: "Boşluk", color: "#2f3640", baseValue: 50000, speed: 25, upCost: 250000 },
            stellar: { name: "Yıldız", color: "#fff700", baseValue: 200000, speed: 28, upCost: 1000000 },
            antimatter: { name: "Antimadde", color: "#ff4757", baseValue: 10000000, speed: 30, upCost: 50000000 },
            blackhole: { name: "Karadelik", color: "#3d1d5a", baseValue: 100000000, speed: 32, upCost: 500000000 },
            universe: { name: "EVREN", color: "#ffffff", baseValue: 1000000000, speed: 35, upCost: 5000000000 }
        };

        class Ball {
            constructor(typeKey) {
                this.typeKey = typeKey;
                const config = ballTypes[typeKey];
                this.radius = 12;
                this.x = Math.random() * (canvas.width - 24) + 12;
                this.y = Math.random() * (canvas.height - 24) + 12;
                let angle = Math.random() * Math.PI * 2;
                this.dx = Math.cos(angle) * config.speed;
                this.dy = Math.sin(angle) * config.speed;
                this.level = 1;
                this.color = config.color;
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.fill(); ctx.strokeStyle = "white"; ctx.stroke();
                ctx.fillStyle = "white"; ctx.font = "bold 10px Arial"; ctx.fillText("L" + this.level, this.x - 7, this.y + 4);
            }
            update() {
                if (this.x + this.radius > canvas.width || this.x - this.radius < 0) { this.dx = -this.dx; handleCollision(this); }
                if (this.y + this.radius > canvas.height || this.y - this.radius < 0) { this.dy = -this.dy; handleCollision(this); }
                this.x += this.dx; this.y += this.dy; this.draw();
            }
        }

        function handleCollision(ball) {
            if (isGameOver) return;
            score += ballTypes[ball.typeKey].baseValue * ball.level;
            if (gameLevel === 1 && score >= 1000000) {
                if (confirm("Seviye 2'ye geçilsin mi?")) { gameLevel = 2; score = 0; balls = [new Ball('legendary')]; }
            } else if (gameLevel === 2 && score >= 100000000) {
                if (confirm("Seviye 3'e geçilsin mi?")) { gameLevel = 3; score = 0; balls = [new Ball('antimatter')]; }
            } else if (score >= 1000000000000) { triggerFinal(); }
            updateUI();
        }

        function triggerFinal() {
            isGameOver = true;
            document.getElementById('final-overlay').style.display = 'flex';
            const container = document.getElementById('rating-container');
            for (let i = 1; i <= 10; i++) {
                let btn = document.createElement('button'); btn.className = 'rating-btn'; btn.innerText = i;
                btn.onclick = () => {
                    document.getElementById('final-screen').innerHTML = "<h1>Teşekkürler!</h1><p>Puanınız: " + i + "/10</p>";
                    setTimeout(() => { document.body.classList.add('vortex'); setTimeout(() => { document.body.innerHTML = ""; }, 2000); }, 1000);
                };
                container.appendChild(btn);
            }
        }

        function renderPacks() {
            let html = `<div class="pack-card"><h3>Standart</h3><p>25 Puan</p><div class="chance-list">🟢 Yaygın: %70<br>🔵 Nadir: %25<br>🟣 Destansı: %5</div><button class="upgrade-btn" onclick="buyPack('s1')">Al</button></div>
                        <div class="pack-card"><h3>Gümüş</h3><p>75 Puan</p><div class="chance-list">🔵 Nadir: %60<br>🟣 Destansı: %35<br>🟡 Efsanevi: %5</div><button class="upgrade-btn" onclick="buyPack('s2')">Al</button></div>
                        <div class="pack-card"><h3>Elit</h3><p>150 Puan</p><div class="chance-list">🟣 Destansı: %60<br>🟡 Efsanevi: %35<br>🟠 Özel: %5</div><button class="upgrade-btn" onclick="buyPack('s3')">Al</button></div>
                        <div class="pack-card premium"><h3>PREMIUM</h3><p>10.000 Puan</p><div class="chance-list">🟠 Özel: %80<br>💖 Mistik: %20</div><button class="upgrade-btn" style="background:#f1c40f; color:black" onclick="buyPack('s4')">Al</button></div>`;
            if (gameLevel >= 2) html += `<div class="pack-card lvl2-pack"><h3>Kuantum</h3><p>50.000 Puan</p><div class="chance-list">🌀 Kuantum: %80<br>🌑 Boşluk: %20</div><button class="upgrade-btn" onclick="buyPack('s5')">Al</button></div>
                                        <div class="pack-card lvl2-pack"><h3>Galaktik</h3><p>500.000 Puan</p><div class="chance-list">🌑 Boşluk: %70<br>⭐ Yıldız: %30</div><button class="upgrade-btn" onclick="buyPack('s6')">Al</button></div>`;
            if (gameLevel >= 3) html += `<div class="pack-card lvl3-pack"><h3>Evrensel</h3><p>500M Puan</p><div class="chance-list">🔴 Antimadde: %85<br>🕳️ Karadelik: %14<br>🌌 EVREN: %1</div><button class="upgrade-btn" onclick="buyPack('s7')">Al</button></div>`;
            packContainer.innerHTML = html;
        }

        function buyPack(id) {
            if (balls.length >= invLimit) return alert("Envanter dolu!");
            let cost = 0, type = 'common', r = Math.random() * 100;
            if (id==='s1') { cost=25; type=r<5?'epic':(r<30?'rare':'common'); }
            else if (id==='s2') { cost=75; type=r<5?'legendary':(r<40?'epic':'rare'); }
            else if (id==='s3') { cost=150; type=r<5?'special':(r<40?'legendary':'epic'); }
            else if (id==='s4') { cost=10000; type=r<20?'mystic':'special'; }
            else if (id==='s5') { cost=50000; type=r<20?'void':'quantum'; }
            else if (id==='s6') { cost=500000; type=r<30?'stellar':'void'; }
            else if (id==='s7') { cost=500000000; type=r<1?'universe':(r<15?'blackhole':'antimatter'); }
            if (score < cost) return alert("Puan yetersiz!");
            score -= cost; balls.push(new Ball(type)); updateUI(); renderInventory();
        }

        function renderInventory() {
            ballListContainer.innerHTML = '<h3>Toplarımı Yönet (' + balls.length + '/' + invLimit + ')</h3>';
            balls.forEach((b, i) => {
                let cost = b.level * ballTypes[b.typeKey].upCost;
                let div = document.createElement('div'); div.className = 'ball-item';
                div.innerHTML = `<span><b style="color:${b.color}">${ballTypes[b.typeKey].name}</b> (L${b.level})</span>
                <div><button class="upgrade-btn" onclick="upgradeBall(${i})">Yükselt (${cost.toLocaleString()})</button>
                <button class="delete-btn" onclick="deleteBall(${i})">Sil</button></div>`;
                ballListContainer.appendChild(div);
            });
        }

        window.upgradeBall = (i) => {
            let b = balls[i]; let c = b.level * ballTypes[b.typeKey].upCost;
            if (score >= c) { score -= c; b.level++; updateUI(); renderInventory(); }
        };
        window.deleteBall = (i) => { if(balls.length > 1 && confirm("Silinsin mi?")) { balls.splice(i, 1); updateUI(); renderInventory(); } };
        
        function upgradeInventory() {
            if(score >= 5000) { 
                score -= 5000; invLimit += 10; 
                updateUI(); 
                renderInventory(); // Envanter listesi başlığını (x/50) anlık güncellemek için.
            } else { alert("Yetersiz puan! En az 5.000 puan lazım."); }
        }

        function toggleMarket(s) { document.getElementById('market-overlay').style.display = s ? 'flex' : 'none'; if(s) renderInventory(); }
        function updateUI() {
            scoreDisplay.innerText = Math.floor(score).toLocaleString();
            ballCountDisplay.innerText = balls.length;
            invLimitDisplay.innerText = invLimit;
            gameLvlDisplay.innerText = gameLevel;
            renderPacks();
        }
        function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); if(!isGameOver) balls.forEach(b => b.update()); requestAnimationFrame(animate); }
        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
        window.onresize(); balls.push(new Ball('common')); animate(); updateUI();
    </script>
</body>
</html>
