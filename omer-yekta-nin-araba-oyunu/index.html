<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hızlı Yarışçı</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: sans-serif; }
        canvas { display: block; background: #333; }
        #ui {
            position: absolute; top: 20px; left: 20px;
            color: white; font-size: 24px; font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #gameOver {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; text-align: center; display: none;
            background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px;
        }
        button { padding: 10px 20px; font-size: 18px; cursor: pointer; border: none; background: #f00; color: white; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="ui">Skor: 0</div>
    <div id="gameOver">
        <h1>OYUN BİTTİ!</h1>
        <p id="finalScore"></p>
        <button onclick="resetGame()">Tekrar Dene</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');
        const gameOverScreen = document.getElementById('gameOver');
        const finalScoreText = document.getElementById('finalScore');

        // Ekran boyutunu ayarla
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Oyun Değişkenleri
        let score = 0;
        let isGameOver = false;
        let speed = 8; // Yolun akış hızı
        let obstacles = [];
        let frames = 0;

        // Araba Modeli
        const car = {
            width: 60,
            height: 100,
            x: canvas.width / 2 - 30,
            y: canvas.height - 150,
            color: '#ff0000',
            speed: 12 // Sağ-sol hızı
        };

        // Kontroller
        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        // Engel Oluşturma
        function spawnObstacle() {
            const width = 70 + Math.random() * 30; // Büyük arabalar
            const height = 120 + Math.random() * 50;
            const x = Math.random() * (canvas.width - width);
            obstacles.push({ x, y: -height, width, height, color: '#3498db' });
        }

        function update() {
            if (isGameOver) return;

            frames++;
            score++;
            ui.innerText = "Skor: " + Math.floor(score / 10);

            // Hareket Kontrolü
            if (keys['ArrowLeft'] && car.x > 0) car.x -= car.speed;
            if (keys['ArrowRight'] && car.x < canvas.width - car.width) car.x += car.speed;

            // Engelleri Güncelle
            if (frames % 40 === 0) spawnObstacle(); // Engel sıklığı

            obstacles.forEach((obs, index) => {
                obs.y += speed; // Engeller aşağı akar

                // Çarpışma Testi
                if (car.x < obs.x + obs.width &&
                    car.x + car.width > obs.x &&
                    car.y < obs.y + obs.height &&
                    car.y + car.height > obs.y) {
                    endGame();
                }

                // Ekrandan çıkanları sil
                if (obs.y > canvas.height) obstacles.splice(index, 1);
            });

            // Zorluk seviyesini artır
            if (score % 500 === 0) speed += 0.5;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Yol Çizgileri (Efekt)
            ctx.strokeStyle = "white";
            ctx.setLineDash([20, 20]);
            ctx.lineDashOffset = -frames * speed;
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();

            // Oyuncuyu Çiz
            ctx.fillStyle = car.color;
            ctx.fillRect(car.x, car.y, car.width, car.height);
            // Detay (Far)
            ctx.fillStyle = "yellow";
            ctx.fillRect(car.x + 5, car.y + 5, 15, 10);
            ctx.fillRect(car.x + car.width - 20, car.y + 5, 15, 10);

            // Engelleri Çiz
            obstacles.forEach(obs => {
                ctx.fillStyle = obs.color;
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
            });

            requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        function endGame() {
            isGameOver = true;
            gameOverScreen.style.display = 'block';
            finalScoreText.innerText = "Skorun: " + Math.floor(score / 10);
        }

        function resetGame() {
            score = 0;
            speed = 8;
            obstacles = [];
            frames = 0;
            car.x = canvas.width / 2 - 30;
            isGameOver = false;
            gameOverScreen.style.display = 'none';
        }

        draw();
    </script>
</body>
</html>
