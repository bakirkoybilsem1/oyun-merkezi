<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Stratejik Tower Defense - Fix Sürümü</title>
<style>
body { background: #121212; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; }
#ui-top { display: flex; gap: 30px; font-size: 22px; font-weight: bold; margin-bottom: 15px; background: #222; padding: 15px 30px; border-radius: 12px; border: 2px solid #444; }
#game-container { position: relative; line-height: 0; }
canvas { background: #1e272e; border: 5px solid #34495e; border-radius: 8px; cursor: crosshair; }

#shop-container { margin-top: 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 850px; }
.shop-item { padding: 12px; background: #2c3e50; border: 2px solid #444; cursor: pointer; border-radius: 10px; text-align: center; }
.shop-item.selected { border-color: #f1c40f; background: #3e5871; }
.shop-item b { display: block; color: #f1c40f; margin-bottom: 5px; }
.shop-item .cost { font-weight: bold; color: #2ecc71; margin-top: 8px; }

#upgrade-panel {
position: absolute; background: rgba(15, 15, 15, 0.95); padding: 15px;
border-radius: 10px; border: 2px solid #3498db; display: none;
width: 200px; z-index: 10; line-height: normal;
}

#overlay-screen {
position: absolute; top: 0; left: 0; width: 100%; height: 100%;
background: rgba(0,0,0,0.92); display: none; flex-direction: column;
justify-content: center; align-items: center; z-index: 100; border-radius: 5px;
}
.stat-box { background: #1c1c1c; padding: 40px; border-radius: 20px; border: 2px solid #f1c40f; min-width: 450px; text-align: center; }
.stat-item { font-size: 20px; margin: 15px 0; display: flex; justify-content: space-between; border-bottom: 1px solid #2a2a2a; padding-bottom: 5px; }
.next-btn { background: #27ae60; color: white; border: none; padding: 18px 60px; font-size: 22px; border-radius: 10px; cursor: pointer; margin-top: 30px; font-weight: bold; }
</style>
</head>
<body>

<div id="ui-top">
<span> 📅GÜN: <span id="dayText">1</span></span>
<span> ❤️CAN: <span id="health">5</span></span>
<span> 💰ALTIN:<span id="money">150</span></span>
</div>

<div id="game-container">
<canvas id="gameCanvas" width="850" height="450"></canvas>

<div id="upgrade-panel">
<h3 id="up-name" style="margin:0; color:#3498db">Kule</h3>
<p>Seviye: <b id="up-lvl">1</b></p>
<p>Hasar: <b id="up-dmg">1</b></p>
<button onclick="upgradeSelectedTower( )" style="background:#f1c40f; width:100%; padding:10px; font-weight:bold; border:none; border-radius:5px; cursor:pointer;">YÜKSELT (<span id="up-cost">50</span>G) </button>
<button onclick="closeUpgradePanel()" style="width:100%; margin-top:8px; cursor:pointer; background:#444; color:white; border:none; padding:6px;">Kapat</button>
</div>

<div id="overlay-screen">
<div class="stat-box">
<h2 id="overlay-title">GÜN ÖZETİ</h2>
<div id="analysis-content"></div>
<button class="next-btn" onclick="startNextDay()">YENİ GÜNE BAŞLA (+1 ❤️)</button>
</div>
</div>
</div>

<div id="shop-container">
<div class="shop-item selected" onclick="selectTower('basic', 50, this)"><b> 🏹Standart</b><p>Dengeli Kule</p><div class="cost">50 Altın</div></div>
<div class="shop-item" onclick="selectTower('fast', 100, this)"><b> ⚡Seri Atış</b><p>Hızlı Mermiler</p><div class="cost">100 Altın</div></div>
<div class="shop-item" onclick="selectTower('sniper', 150, this)"><b> 🎯Nişancı</b><p>Uzak ve Güçlü</p><div class="cost">150 Altın</div></div>
<div class="shop-item" onclick="selectTower('ice', 120, this)"><b> ❄️Buz</b><p>Yavaşlatma Etkisi</p><div class="cost">120 Altın</div></div>
<div class="shop-item" onclick="selectTower('poison', 130,🧪<div class="shop-item" onclick="selectTower('bomb', 200, this)"><b> Bomba</b>
<p> Alan Hasarı</p><div class="cost">200 Altın</div> 💣</div> </div> <script> const canvas = document.getElementById(' gameCanvas'); const ctx = canvas.getContext(' 2d '); let health = 5, money = 150, day = 1; let enemiesSpawned
= 0, enemiesKilled = 0, enemiesEscaped = 0, dailyGold = 0; const enemiesPerWave = 10; let isPaused = false, activeTower = null; let selectedTowerType = 'basic', selectedTowerCost = 50; const enemies = [], kuleler = [], mermiler = [];












const waypoints = [{x: -30, y: 225}, {x: 200, y: 225}, {x: 200, y: 100}, {x: 450, y: 100}, {x: 450, y: 350}, {x: 700, y: 350}, {x: 700, y: 150}, {x: 880, y: 150}];

const towerTypes = {
basic: { name: "Standart", color: '#3498db', range: 130, cooldown: 30, damage: 2, effect: 'none' },
fast: { name: "Seri", color: '#e67e22', range: 110, cooldown: 8, damage: 0.8, effect: 'none' },
sniper: { name: "Nişancı", color: '#9b59b6', range: 380, cooldown: 120, damage: 12, effect: 'none' },
ice: { name: "Buz", color: '#1abc9c', range: 120, cooldown: 40, damage: 0.5, effect: 'slow' },
poison: { name: "Zehir", color: '#2ecc71', menzil: 140, bekleme süresi: 50, hasar: 4, etki: 'yok' },
bomba: { isim: "Bomba", renk: '#e74c3c', menzil: 160, bekleme süresi: 100, hasar: 8, etki: 'alan etkili' }
};

sınıf Düşman {
yapıcı(günSeviyesi) {
this.x = yol noktaları[0].x; this.y = yol noktaları[0].y;
this.temelHız = 1.1 + (günSeviyesi * 0.08);
this.hız = this.temelHız;
this.maksimumCan = 4 + (günSeviyesi * 2.5);
this.can = this.maksimumCan;
this.yol noktasıİndeksi = 0;
}
güncelleme() {
let hedef = yol noktaları[bu.yol noktasıİndeksi + 1];
let dx = hedef.x - bu.x, dy = hedef.y - bu.y;
let dist = Math.hypot(dx, dy);
if (dist < this.speed) {
this.waypointIndex++;
if (this.waypointIndex >= waypoints.length - 1) { health--; enemiesEscaped++; this.hp = 0; enemiesKilled++; }
} else { this.x += (dx / dist) * this.speed; this.y += (dy / dist) * this.speed; }
if (this.speed < this.baseSpeed) this.speed += 0.005;
}
draw() {
ctx.fillStyle = "#000"; ctx.fillRect(this.x - 18, this.y - 28, 36, 6);
ctx.fillStyle = "#2ecc71"; ctx.fillRect(this.x - 18, this.y - 28, (Math.max(0, this.hp) / this.maxHp) * 36, 6);
ctx.fillStyle = (this.speed < this.baseSpeed) ? "#3498db" : "#e74c3c";
ctx.beginPath(); ctx.arc(this.x, this.y, 13, 0, Math.PI * 2); ctx.fill();
ctx.fillStyle = "white"; ctx.font = "bold 10px Arial"; ctx.textAlign = "center";
ctx.fillText(Math.ceil(this.hp ), this.x, this.y - 32);
}
}

class Projectile {
constructor(x, y, target, stats) {
this.x = x; this.y = y; bu.hedef = hedef; bu.istatistikler = istatistikler;
bu.hız = 12; bu.ölü = false;
}
güncelleme() {
eğer (bu.hedef.hp <= 0) { bu.ölü = true; geri dön; }
let dx = this.target.x - this.x, dy = this.target.y - this.y;
let dist = Math.hypot(dx, dy);
if (dist < this.speed) {
this.hit(this.target);
this.dead = true;
} else { this.x += (dx / dist) * this.speed; this.y += (dy / dist) * this.speed; }
}
hit(mainTarget) {
if (this.stats.effect === 'aoe') {
enemies.forEach(e => {
if (Math.hypot(ex - this.x, ey - this.y) < 70) {
e.hp -= this.stats.damage;
this.checkKill(e);
}
});
} else {
mainTarget.hp -= this.stats.damage;
if (this.stats.effect === 'slow') mainTarget.speed *= 0.4;
this.checkKill(mainTarget);
}
}
checkKill(enemy) {
if (enemy.hp <= 0 && !enemy.rewarded) {
enemy.rewarded = true; money += 5; dailyGold += 5; enemiesKilled++;
}
}
draw() { ctx.fillStyle = this.stats.color; ctx.beginPath(); ctx.arc(this.x, this.y, 5, 0, Math.PI * 2); ctx.fill(); }
}

class Tower {
constructor(x, y, type) {
this.x = x; this.y = y; this.type = type; this.level = 1;
this.stats = JSON.parse(JSON.stringify( towerTypes[type]));
this.cooldown = 0;
this.upgradeCost = Math.floor(towerTypes[type] .damage * 40);
}
update() {
if (this.cooldown > 0) this.cooldown--;
if (this.cooldown <= 0) {
const target = enemies.find(e => e.hp > 0 && Math.hypot(ex - this.x, ey - this.y) < this.stats.range);
if (target) {
projectiles.push(new Projectile(this.x, this.y, target, this.stats));
this.cooldown = this.stats.cooldown;
}
}
}
draw() {
if (activeTower === this) {
ctx.strokeStyle = "rgba(255, 255, 255, 0.3)"; ctx.lineWidth = 2;
ctx.beginPath(); ctx.arc(this.x, this.y, this.stats.range, 0, Math.PI * 2); ctx.stroke();
}
ctx.fillStyle = this.stats.color;
ctx.beginPath(); ctx.roundRect(this.x - 20, this.y - 20, 40, 40, 10); ctx.fill();
ctx.fillStyle = "white"; ctx.font = "bold 14px Arial"; ctx.textAlign = "center";
ctx.fillText("L" + this.level, this.x, this.ve + 6);
}
}

// UI ve Döngü Fonksiyonları
function selectTower(type, cost, el) {
selectedTowerType = type; selectedTowerCost = cost;
document.querySelectorAll('. shop-item').forEach(i => i.classList.remove('selected') );
el.classList.add('selected');
}

canvas.addEventListener(' mousedown', (e) => {
if (isPaused) return;
const rect = canvas.getBoundingClientRect() ;
const x = e.clientX - rect.left, y = e.clientY - rect.top;
const clicked = towers.find(t => Math.hypot(tx - x, ty - y) < 25);
if (clicked) { activeTower = clicked; updateUpgradeUI(); }
else { if (money >= selectedTowerCost) { towers.push(new Tower(x, y, selectedTowerType)); money -= selectedTowerCost; closeUpgradePanel(); } }
});

function updateUpgradeUI() {
const panel = document.getElementById(' upgrade-panel');
document.getElementById('up- name').innerText = activeTower.stats.name ;
document.getElementById('up- lvl').innerText = activeTower.level;
document.getElementById('up- dmg').innerText = activeTower.stats.damage.toFixed (1);
document.getElementById('up- cost').innerText = activeTower.upgradeCost;
panel.style.display = 'block'; panel.style.left = (activeTower.x + 15) + "px"; panel.style.top = (activeTower.y - 100) + "px";
}

function upgradeSelectedTower() {
if (activeTower && money >= activeTower.upgradeCost) {
money -= activeTower.upgradeCost; activeTower.level++;
activeTower.stats.damage *= 1.5; activeTower.stats.range += 20;
activeTower.upgradeCost = Math.floor(activeTower.upgradeCost * 1.8);
updateUpgradeUI();
}
}

function closeUpgradePanel() { activeTower = null; document.getElementById(' upgrade-panel').style.display = 'none'; }

function startNextDay() {
day++; if (health < 10) health++;
enemiesSpawned = 0; enemiesKilled = 0; enemiesEscaped = 0; dailyGold = 0; money += 50;
isPaused = false; document.getElementById(' overlay-screen').style.display = 'none';
}

let spawnTimer = 0;
function gameLoop() {
if (!isPaused) {
ctx.clearRect(0, 0, canvas.width, canvas.height);
ctx.strokeStyle = "#2f3640"; ctx.lineWidth = 45; ctx.lineJoin = "round"; ctx.lineCap = "round";
ctx.beginPath(); waypoints.forEach((p, i) => { if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py); }); ctx.stroke();

if (enemiesSpawned < enemiesPerWave) {
spawnTimer++; if (spawnTimer > (80 - (day * 2))) { enemies.push(new Enemy(day)); enemiesSpawned++; spawnTimer = 0; }
} else if (enemiesKilled >= enemiesPerWave && enemies.every(e => e.hp <= 0)) {
isPaused = true;
document.getElementById(' analysis-content').innerHTML = `
<div class="stat-item"><span> Tamamlanan Gün:</span> <b>${day}</b></div>
<div class="stat-item"><span>Kaçan Düşman:</span> <b style="color:#e74c3c">${ enemiesEscaped}</b></div>
<div class="stat-item"><span> Kazanılan Altın:</span> <b style="color:#2ecc71">+${ dailyGold + 50}</b></div>`;
document.getElementById(' overlay-screen').style.display = 'flex';
}

düşmanlar.forEach((e, i) => { eğer (e.hp > 0) { e.update(); e.draw(); } else eğer (e.hp <= 0) { düşmanlar.splice(i, 1); } });
kuleler.forEach(t => { t.update(); t.draw(); });
mermiler.forEach((p, i) => { p.update(); p.draw(); eğer (p.dead) mermiler.splice(i, 1); });

document.getElementById(' health').innerText = health; document.getElementById(' money').innerText = money; document.getElementById(' dayText').innerText = day;
eğer (health <= 0) { isPaused = true; document.getElementById(' overlay-screen').style.display = 'flex'; } document.getElementById(' overlay-screen').innerHTML = `<div class="stat-box"><h1>OYUN BİTTİ</h1><button class="next-btn" onclick="location.reload()"> TEKRAR DENE</button></div>`; }
}
requestAnimationFrame( gameLoop);
}
gameLoop();
</script>
</body>
</html>
