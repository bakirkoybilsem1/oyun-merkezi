<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BİLSEM Oyun Merkezi 🎮</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #0f0c29, #302b63, #24243e);
      font-family: 'Fredoka One', cursive;
      padding: 40px 20px 60px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      color: white;
      text-shadow: 0 4px 24px rgba(240,147,251,0.5);
      margin-bottom: 10px;
    }

    header p {
      color: rgba(255,255,255,0.5);
      font-size: 1.1rem;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      max-width: 960px;
      margin: 0 auto;
    }

    .kart {
      text-decoration: none;
      width: 100%;
      max-width: 440px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 24px 28px;
      display: flex;
      align-items: center;
      gap: 18px;
      transition: background 0.2s, transform 0.2s;
      cursor: pointer;
      opacity: 0;
      animation: fadeIn 0.35s ease forwards;
    }

    .kart:hover {
      background: rgba(255,255,255,0.13);
      transform: translateY(-3px);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .emoji-kutu {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      flex-shrink: 0;
    }

    .icerik { flex: 1; }

    .oyun-adi {
      color: white;
      font-size: 1rem;
      line-height: 1.3;
      margin-bottom: 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 0.82rem;
      font-family: 'Fredoka One', cursive;
    }

    .ok {
      color: rgba(255,255,255,0.3);
      font-size: 1.4rem;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <header>
    <h1>🎮 BİLSEM Oyun Merkezi</h1>
    <p>Oynamak istediğin oyunu seç!</p>
  </header>

  <div class="grid" id="grid"></div>

  <script>
    function acikMi(hex) {
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      return (r * 299 + g * 587 + b * 114) / 1000 > 155;
    }

    fetch('/games.json')
      .then(r => r.json())
      .then(oyunlar => {
        const grid = document.getElementById('grid');
        oyunlar.forEach((oyun, i) => {
          const [c1, c2] = oyun.colors;
          const textColor = acikMi(c1) ? '#333' : 'white';
          const a = document.createElement('a');
          a.className = 'kart';
          a.href = '/' + oyun.slug;
          a.style.animationDelay = (i * 55) + 'ms';
          a.innerHTML = `
            <div class="emoji-kutu" style="background:linear-gradient(135deg,${c1},${c2});box-shadow:0 8px 24px ${c1}55">${oyun.emoji}</div>
            <div class="icerik">
              <div class="oyun-adi">${oyun.name}</div>
              <span class="btn" style="background:linear-gradient(135deg,${c1},${c2});color:${textColor}">▶ Oyuna giriş yapmak için tıklayınız</span>
            </div>
            <div class="ok">→</div>
          `;
          grid.appendChild(a);
        });
      });
  </script>

</body>
</html>
