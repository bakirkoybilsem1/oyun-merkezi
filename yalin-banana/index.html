<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Survival: Duvarlar Geçilmez!</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: sans-serif; user-select: none; }
        canvas { display: block; }
        #status-ui {
            position: absolute; top: 10px; left: 10px;
            color: white; background: rgba(0,0,0,0.8);
            padding: 15px; border-radius: 10px; border: 2px solid #555;
            pointer-events: none; z-index: 100;
        }
        #inventory-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 999;
        }
        #inv-window { width: 400px; background: #2c3e50; padding: 30px; border-radius: 20px; border: 4px solid #f1c40f; color: white; text-align: center; }
        .recipe { background: #34495e; margin: 10px 0; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        button { background: #27ae60; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #hotbar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; background: rgba(0,0,0,0.9); padding: 10px; border-radius: 15px; z-index: 100; }
        .slot { width: 60px; height: 60px; border: 2px solid #777; margin: 0 5px; border-radius: 10px; color: white; font-size: 11px; display: flex; align-items: center; justify-content: center; text-align: center; }
        .selected { border-color: #f1c40f; box-shadow: 0 0 15px #f1c40f; }
    </style>
</head>
<body>

<div id="status-ui">
    <div style="color:#e74c3c; font-size: 20px; font-weight: bold;">CAN: <span id="hp-val">100</span></div>
    <div id="time-val" style="color:#f1c40f;">Vakit: Gündüz</div>
    <hr>
    <div>🪵 Odun: <span id="wood-val">0</span> | 📦 Tahta: <span id="plank-val">0</span></div>
    <div>🧱 Duvar: <span id="wall-val">0</span></div>
</div>

<div id="inventory-overlay">
    <div id="inv-window">
        <h2>⚒️ ÜRETİM MASASI</h2>
        <div class="recipe"><span>2 Odun ➔ 4 Tahta</span> <button onclick="doCraft('plank')">ÜRET</button></div>
        <div class="recipe"><span>4 Tahta ➔ 1 Duvar</span> <button onclick="doCraft('wall')">ÜRET</button></div>
        <button style="background:#c0392b; width:100%; margin-top:20px;" onclick="toggleInv()">KAPAT (E)</button>
    </div>
</div>

<div id="hotbar">
    <div id="slot1" class="slot selected">🧱<br>Duvar (1)</div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let game = {
    wood: 0, plank: 0, wallCount: 0,
    hp: 100, isInvOpen: false, 
    time: 0, playerX: canvas.width/2, playerY: canvas.height/2,
    pSize: 15, wallSize: 40
};

let resources = [];
let mobs = [];
let placedWalls = [];
const keys = {};

for(let i=0; i<15; i++) spawnObj('tree');

function spawnObj(type) {
    resources.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, type, hp: 3});
}

function toggleInv() {
    game.isInvOpen = !game.isInvOpen;
    document.getElementById("inventory-overlay").style.display = game.isInvOpen ? "flex" : "none";
}

function doCraft(item) {
    if(item === 'plank' && game.wood >= 2) { game.wood -= 2; game.plank += 4; }
    if(item === 'wall' && game.plank >= 4) { game.plank -= 4; game.wallCount += 1; }
    updateStats();
}

function updateStats() {
    document.getElementById("hp-val").innerText = Math.floor(game.hp);
    document.getElementById("wood-val").innerText = game.wood;
    document.getElementById("plank-val").innerText = game.plank;
    document.getElementById("wall-val").innerText = game.wallCount;
}

// ÇARPIŞMA KONTROLÜ (DUVARLAR İÇİN)
function checkCollision(newX, newY, size) {
    for (let wall of placedWalls) {
        if (newX + size > wall.x - 20 && newX - size < wall.x + 20 &&
            newY + size > wall.y - 20 && newY - size < wall.y + 20) {
            return true; // Çarpışma var
        }
    }
    return false;
}

window.addEventListener("keydown", e => { if(e.key.toLowerCase() === 'e') toggleInv(); keys[e.key.toLowerCase()] = true; });
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

canvas.addEventListener("mousedown", e => {
    if(game.isInvOpen) return;
    if(e.button === 0) {
        resources.forEach((r, i) => {
            if(Math.hypot(game.playerX - r.x, game.playerY - r.y) < 60) {
                r.hp--;
                if(r.hp <= 0) { game.wood += 5; resources.splice(i, 1); spawnObj('tree'); }
            }
        });
        mobs.forEach((m, i) => {
            if(Math.hypot(game.playerX - m.x, game.playerY - m.y) < 50) mobs.splice(i, 1);
        });
    } else if(e.button === 2) {
        if(game.wallCount > 0) {
            placedWalls.push({x: e.clientX, y: e.clientY});
            game.wallCount--;
        }
    }
    updateStats();
});
canvas.oncontextmenu = (e) => e.preventDefault();

function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    game.time = (game.time + 1) % 4000;
    const isNight = game.time > 2000;
    ctx.fillStyle = isNight ? "#0a0f0a" : "#2d5a27";
    ctx.fillRect(0,0, canvas.width, canvas.height);
    document.getElementById("time-val").innerText = isNight ? "Vakit: Gece 💀" : "Vakit: Gündüz ☀️";

    // Oyuncu Hareketi (Duvar Çarpışmalı)
    if(!game.isInvOpen) {
        let nextX = game.playerX;
        let nextY = game.playerY;
        if(keys['w']) nextY -= 4;
        if(keys['s']) nextY += 4;
        if(keys['a']) nextX -= 4;
        if(keys['d']) nextX += 4;

        if (!checkCollision(nextX, game.playerY, game.pSize)) game.playerX = nextX;
        if (!checkCollision(game.playerX, nextY, game.pSize)) game.playerY = nextY;
    }

    // Ağaçlar
    resources.forEach(r => {
        ctx.fillStyle = "#1b5e20";
        ctx.beginPath(); ctx.arc(r.x, r.y, 20, 0, Math.PI*2); ctx.fill();
    });

    // Duvarlar
    placedWalls.forEach(o => {
        ctx.fillStyle = "#444";
        ctx.fillRect(o.x-20, o.y-20, 40, 40);
        ctx.strokeStyle = "#000"; ctx.strokeRect(o.x-20, o.y-20, 40, 40);
    });

    // Moblar (Duvar Çarpışmalı)
    if(isNight && Math.random() < 0.03) {
        mobs.push({x: Math.random() < 0.5 ? -20 : canvas.width + 20, y: Math.random()*canvas.height, hp: 1});
    }
    mobs.forEach((m, i) => {
        let angle = Math.atan2(game.playerY - m.y, game.playerX - m.x);
        let nextMX = m.x + Math.cos(angle) * 2;
        let nextMY = m.y + Math.sin(angle) * 2;

        // Mob duvar çarpışma kontrolü
        if (!checkCollision(nextMX, m.y, 10)) m.x = nextMX;
        if (!checkCollision(m.x, nextMY, 10)) m.y = nextMY;

        ctx.fillStyle = "#2ecc71";
        ctx.beginPath(); ctx.arc(m.x, m.y, 10, 0, Math.PI*2); ctx.fill();
        
        if(Math.hypot(game.playerX - m.x, game.playerY - m.y) < 20) {
            game.hp -= 0.3;
            updateStats();
        }
    });

    // Karakter
    ctx.fillStyle = "#e67e22";
    ctx.beginPath(); ctx.arc(game.playerX, game.playerY, game.pSize, 0, Math.PI*2); ctx.fill();

    if(game.hp <= 0) { alert("ÖLDÜN!"); location.reload(); }
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
